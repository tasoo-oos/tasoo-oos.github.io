<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
    <head>
        <meta name="author" content="Tasoo Park" />
        <meta charset="utf-8" />
        <title>flex</title>
        <link rel="stylesheet" href="./scss/bootstrap-support.css" />
        <script src="./light_dark_toggle.js"></script>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
            }

            #flexed {
                padding: 0;
                list-style: none;
                width: 100%;
                height: 100%;
                display: flex;
                margin: 0;
            }

            #flexed li {
                color: black;
            }

            #flexed li:nth-child(1) {
                background-color: #ff7f7f; /* Light Red */
            }

            #flexed li:nth-child(2) {
                background-color: #ffe77a; /* Light Yellow */
            }

            #flexed li:nth-child(3) {
                background-color: #7fff7f; /* Light Green */
            }

            #flexed li:nth-child(4) {
                background-color: #7fa0ff; /* Light Blue */
            }

            #flexed li:nth-child(5) {
                background-color: #d67aff; /* Light Violet */
            }

            #resizable-div {
                height: 400px;
                width: 300px;
                position: relative;
                border: 1px solid#888;
            }

            #dragzone-horizontal {
                width: 10px;
                height: 100%;
                cursor: ew-resize;
                position: absolute;
                right: 0;
                bottom: 0;
            }

            #dragzone-vertical {
                width: 100%;
                height: 10px;
                cursor: ns-resize;
                position: absolute;
                right: 0;
                bottom: 0;
            }

            .tables-container {
                display: flex;
                width: 800px;
                height: 300px;
            }

            .tables-container table {
                flex: 1;
                margin-right: 10px;
            }

            output {
                margin: 8px;
            }
        </style>
    </head>
    <body>
        <h1>flex 체험</h1>
        <h3>이 사이트는 둘러만 보고 직접 코드를 짜볼 것을 강력히 추천함</h3>
        <button id="color-mode">dark/light</button>
        <hr />
        <!--ul, li는 기본 블록 디스플레이 속성-->

        <div id="resizable-div">
            <div id="dragzone-horizontal"></div>
            <div id="dragzone-vertical"></div>
            <ul id="flexed">
                <li>호랑이</li>
                <li>고양이</li>
                <li>강아지</li>
                <li>개구리</li>
                <li>개나리</li>
            </ul>
        </div>

        <div class="tables-container">
            <table class="table table-bordered">
                <tr>
                    <td>flex-direction</td>
                    <td>
                        <select id="flex_direction">
                            <option value="">None</option>
                            <option value="flex-direction:row;">row</option>
                            <option value="flex-direction:row-reverse;">row-reverse</option>
                            <option value="flex-direction:column;">column</option>
                            <option value="flex-direction:column-reverse;">column-reverse</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>flex-wrap</td>
                    <td>
                        <select id="flex_wrap">
                            <option value="">None</option>
                            <option value="flex-wrap:nowrap;">nowrap</option>
                            <option value="flex-wrap:wrap;">wrap</option>
                            <option value="flex-wrap:wrap-reverse;">wrap-reverse</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>justify-content</td>
                    <td>
                        <select id="justify_content">
                            <option value="">None</option>
                            <option value="justify-content:flex-start;">flex-start</option>
                            <option value="justify-content:flex-end;">flex-end</option>
                            <option value="justify-content:center;">center</option>
                            <option value="justify-content:space-between;">space-between</option>
                            <option value="justify-content:space-around;">space-around</option>
                            <option value="justify-content:space-evenly;">space-evenly</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>align-items</td>
                    <td>
                        <select id="align_items">
                            <option value="">None</option>
                            <option value="align-items:stretch;">stretch</option>
                            <option value="align-items:flex-start;">flex-start</option>
                            <option value="align-items:flex-end;">flex-end</option>
                            <option value="align-items:center;">center</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>align-content</td>
                    <td>
                        <select id="align_content">
                            <option value="">None</option>
                            <option value="align-content:flex-start;">flex-start</option>
                            <option value="align-content:flex-end;">flex-end</option>
                            <option value="align-content:center;">center</option>
                            <option value="align-content:space-between;">space-between</option>
                            <option value="align-content:space-around;">space-around</option>
                            <option value="align-content:space-evenly;">space-evenly</option>
                        </select>
                    </td>
                </tr>
            </table>

            <table class="table table-bordered">
                <tr>
                    <td>nth-child</td>
                    <td><input type="range" min="0" max="4" value="0" id="nth_child" /><output>0</output></td>
                </tr>

                <tr>
                    <td>align-self</td>
                    <td>
                        <select id="align_self">
                            <option value="">None</option>
                            <option value="align-self:stretch;">stretch</option>
                            <option value="align-self:flex-start;">flex-start</option>
                            <option value="align-self:flex-end;">flex-end</option>
                            <option value="align-self:center;">center</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>flex-grow</td>
                    <td><input type="range" min="0" max="10" step="0.1" value="0" id="flex_grow" /><output>0</output></td>
                </tr>

                <tr>
                    <td>flex-shrink</td>
                    <td><input type="range" min="0" max="10" step="0.1" value="0" id="flex_shrink" /><output>0</output></td>
                </tr>

                <tr>
                    <td>flex-basis</td>
                    <td><input type="range" min="0" max="300" value="0" id="flex_basis" /><output>0</output></td>
                </tr>

                <tr>
                    <td>order</td>
                    <td><input type="range" min="-10" max="10" step="1" value="0" id="order" /><output>0</output></td>
                </tr>
            </table>
        </div>
    </body>
    <script>
        // flex 스타일 조정
        const alignSelfStates = Array.from(document.getElementById('flexed').getElementsByTagName('li')).map(() => '');
        const flexGrowStates = Array.from(document.getElementById('flexed').getElementsByTagName('li')).map(() => 0);
        const flexShrinkStates = Array.from(document.getElementById('flexed').getElementsByTagName('li')).map(() => 0);
        const flexBasisStates = Array.from(document.getElementById('flexed').getElementsByTagName('li')).map(() => 0);
        const orderStates = Array.from(document.getElementById('flexed').getElementsByTagName('li')).map(() => 0);

        function updateStyleContainer() {
            const flex_direction = document.getElementById('flex_direction').value;
            const flex_wrap = document.getElementById('flex_wrap').value;
            const justify_content = document.getElementById('justify_content').value;
            const align_items = document.getElementById('align_items').value;
            const align_content = document.getElementById('align_content').value;
            const flexed = document.getElementById('flexed');
            flexed.style = `${flex_direction}${flex_wrap}${justify_content}${align_items}${align_content}`.trim();
        }

        document.getElementById('flex_direction').addEventListener('change', updateStyleContainer);
        document.getElementById('flex_wrap').addEventListener('change', updateStyleContainer);
        document.getElementById('justify_content').addEventListener('change', updateStyleContainer);
        document.getElementById('align_items').addEventListener('change', updateStyleContainer);
        document.getElementById('align_content').addEventListener('change', updateStyleContainer);

        function updateStyleItems() {
            const nthChild = document.getElementById('nth_child').value;
            const align_self = document.getElementById('align_self').value;
            const flex_grow = document.getElementById('flex_grow').value;
            const flex_shrink = document.getElementById('flex_shrink').value;
            const flex_basis = document.getElementById('flex_basis').value;
            const order = document.getElementById('order').value;
            const items = document.getElementById('flexed').getElementsByTagName('li');

            const flex_grow_after = flex_grow > 0 ? flex_grow : 'auto';
            const flex_shrink_after = flex_shrink > 0 ? flex_shrink : 'auto';
            const flex_basis_after = flex_basis > 0 ? flex_basis + 'px' : 'auto';

            items[nthChild].style = `${align_self} flex-grow: ${flex_grow_after}; flex-shrink: ${flex_shrink_after}; flex-basis: ${flex_basis_after}; order: ${order}`.trim();

            alignSelfStates[nthChild] = align_self;
            flexGrowStates[nthChild] = flex_grow;
            flexShrinkStates[nthChild] = flex_shrink;
            flexBasisStates[nthChild] = flex_basis;
            orderStates[nthChild] = order;
        }

        document.getElementById('align_self').addEventListener('change', updateStyleItems);
        document.getElementById('flex_grow').addEventListener('change', updateStyleItems);
        document.getElementById('flex_shrink').addEventListener('change', updateStyleItems);
        document.getElementById('flex_basis').addEventListener('change', updateStyleItems);
        document.getElementById('order').addEventListener('change', updateStyleItems);

        function updateItemSetting() {
            const nthChild = document.getElementById('nth_child').value;
            const align_self = document.getElementById('align_self');
            const flex_grow = document.getElementById('flex_grow');
            const flex_shrink = document.getElementById('flex_shrink');
            const flex_basis = document.getElementById('flex_basis');
            const order = document.getElementById('order');

            align_self.value = alignSelfStates[nthChild];
            flex_grow.value = flexGrowStates[nthChild];
            flex_shrink.value = flexShrinkStates[nthChild];
            flex_basis.value = flexBasisStates[nthChild];
            order.value = orderStates[nthChild];

            if ('createEvent' in document) {
                let evt = document.createEvent('HTMLEvents');
                evt.initEvent('change', false, true);
                align_self.dispatchEvent(evt);
                flex_grow.dispatchEvent(evt);
                flex_shrink.dispatchEvent(evt);
                flex_basis.dispatchEvent(evt);
                order.dispatchEvent(evt);
            } else {
                align_self.fireEvent('onchange');
                flex_grow.fireEvent('onchange');
                flex_shrink.fireEvent('onchange');
                flex_basis.fireEvent('onchange');
                order.fireEvent('onchange');
            }
        }

        document.getElementById('nth_child').addEventListener('change', updateItemSetting);

        // div 크기 조정
        let box, dragHorizontalElement, dragVerticalElement, startHorizontal, startVertical, startWidth, startHeight;

        const MIN_SIZE = 50;

        function handleHorizontalResize(e) {
            if (startHorizontal) {
                const newWidth = startWidth + e.clientX - startHorizontal;
                if (newWidth > MIN_SIZE) {
                    box.style.width = newWidth + 'px';
                }
            }
        }

        function handleVerticalResize(e) {
            if (startVertical) {
                const newHeight = startHeight + e.clientY - startVertical;
                if (newHeight > MIN_SIZE) {
                    box.style.height = newHeight + 'px';
                }
            }
        }

        box = document.getElementById('resizable-div');
        dragHorizontalElement = document.getElementById('dragzone-horizontal');
        dragVerticalElement = document.getElementById('dragzone-vertical');

        dragHorizontalElement.addEventListener('mousedown', function (e) {
            startHorizontal = e.clientX;
            startWidth = parseInt(document.defaultView.getComputedStyle(box).width, 10);
            e.preventDefault();
        });

        dragVerticalElement.addEventListener('mousedown', function (e) {
            startVertical = e.clientY;
            startHeight = parseInt(document.defaultView.getComputedStyle(box).height, 10);
            e.preventDefault();
        });

        window.addEventListener('mousemove', function (e) {
            window.requestAnimationFrame(function () {
                handleHorizontalResize(e);
                handleVerticalResize(e);
            });
        });

        window.addEventListener('mouseup', function () {
            startHorizontal = false;
            startVertical = false;
            startWidth = null;
            startHeight = null;
        });

        // range들 값 보이게하기
        function showVal() {
            this.nextElementSibling.value = this.value;
        }

        document.getElementById('nth_child').addEventListener('change', showVal);
        document.getElementById('flex_grow').addEventListener('change', showVal);
        document.getElementById('flex_shrink').addEventListener('change', showVal);
        document.getElementById('flex_basis').addEventListener('change', showVal);
        document.getElementById('order').addEventListener('change', showVal);
    </script>
</html>
