<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
    <head>
        <meta name="author" content="Tasoo Park" />
        <meta charset="utf-8" />
        <title>Momentum</title>
        <link rel="stylesheet" href="../scss/bootstrap-support.css" />
        <script src="../light_dark_toggle.js"></script>
        <style>
            .box {
                background-color: rgba(
                    0,
                    0,
                    0,
                    0.7
                ); /* Semi-transparent black */
                color: white; /* White text */
                margin: 10px;
                padding: 20px;
                border-radius: 10px;
            }

            .fade-out {
                opacity: 0;
                text-decoration: line-through;
                transition: opacity 0.5s ease-out, text-decoration 0.5s ease-out;
            }

            #weather img {
                width: 30px;
                height: 30px;
            }
        </style>
    </head>
    <body>
        <button id="color-mode">dark/light</button>
        <div id="time" class="box" style="display: flex">
            <h2 id="date" style="margin-right: 10px">9999/99/99</h2>
            <h4 id="clock" style="margin: 6px">99:99:99</h4>
        </div>
        <div id="weather" class="box">
            <h3></h3>
            <img />
            <span></span>
        </div>
        <form id="login-form" class="box">
            <input
                type="text"
                placeholder="What is your name?"
                required
                maxlength="15"
            />
            <button type="submit">login</button>
        </form>
        <div id="logged-in" class="visually-hidden box">
            <span class="h3">asdad</span>
            <button>logout</button>
        </div>
        <div id="quote" class="box">
            <p></p>
            <p></p>
        </div>
        <form id="todo-form" class="box">
            <input type="text" placeholder="Write and press enter" required />
        </form>
        <ul id="todo-list" class="box"></ul>

        <script src="week7_greetings.js"></script>
        <script src="week7_clock.js"></script>
        <script src="week7_quotes.js"></script>
        <script src="week7_background.js"></script>
        <script src="week7_todo.js"></script>
        <script src="week7_weather.js"></script>
        <script src="../bootstrap/dist/js/bootstrap.bundle.js"></script>
    </body>
</html>
