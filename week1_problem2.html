<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta name="author" content="Tasoo Park" />
        <meta charset="utf-8" />
        <title>프엔 경연대회</title>
    </head>
    <body>
        <header>
            <h1>프로그래밍 경연 대회</h1>
            <p>여러 언어를 통해 코딩 문제를 풀어보자!</p>
        </header>

        <hr />

        <section>
            <form>
                <h3>개인정보</h3>
                <ul>
                    <li>이름 <input type="text" name="name" /></li>
                    <li>
                        연락처
                        <input type="tel" name="phone" />
                    </li>
                </ul>

                <h3>지원분야</h3>
                <input type="checkbox" name="language" />c/c++
                <input type="checkbox" name="language" />python
                <input type="checkbox" name="language" />javascript
                <input type="checkbox" name="language" id="htmlCheckbox" />html

                <p id="warningText"></p>

                <h3>할 말</h3>
                <textarea name="message" rows="8" cols="30"></textarea><br />

                <input
                    type="button"
                    value="제출"
                    onclick="alert('뻥이지롱~');"
                />

                <button type="button" name="erase" id="erase">
                    내용 지우기
                </button>

                <h3>포트폴리오</h3>
                <input type="file" name="portfolio" />

                <h3>자신의 실력</h3>
                <input
                    type="range"
                    name="points"
                    min="0"
                    max="3"
                    step="1"
                    value="0"
                    onchange="updateSkillLevel()"
                />
                <p id="skillLevelText">실력: Beginner</p>

                <h3>희망 대회 일시</h3>
                <input type="date" name="contestdate" />
            </form>
        </section>

        <br />
        <hr />
    </body>

    <script>
        const textarea = document.querySelector('textarea');
        const erase_btn = document.querySelector('#erase');
        const skillLevelText = document.querySelector('#skillLevelText');
        const htmlCheckbox = document.querySelector('#htmlCheckbox');
        const warningText = document.querySelector('#warningText');

        erase_btn.addEventListener('click', () => {
            textarea.value = '';
        });

        htmlCheckbox.addEventListener('change', () => {
            warningText.textContent = htmlCheckbox.checked
                ? 'HTML은 프로그래밍 언어가 아닙니다.'
                : '';
        });

        function updateSkillLevel() {
            const rangeInput = document.querySelector('input[name="points"]');
            const skillLevel = parseInt(rangeInput.value);

            let skillText;

            switch (skillLevel) {
                case 0:
                    skillText = '실력: Beginner';
                    break;
                case 1:
                    skillText = '실력: Intermediate';
                    break;
                case 2:
                    skillText = '실력: Advanced';
                    break;
                case 3:
                    skillText = '실력: Expert';
                    break;
                default:
                    skillText = '실력: Unknown';
            }

            skillLevelText.textContent = skillText;
        }
    </script>
</html>
