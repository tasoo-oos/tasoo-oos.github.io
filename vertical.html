<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="css/vertical_screen.css" />
        <link rel="stylesheet" href="css/responsive_button.css" />
        <author>Tasoo Park</author>
    </head>
    <body>
        <div class="slider-container">
            <!-- Radio Buttons -->
            <input type="radio" name="slider" id="nav0" checked />
            <input type="radio" name="slider" id="nav1" />
            <input type="radio" name="slider" id="nav2" />
            <input type="radio" name="slider" id="nav3" />
            <input type="radio" name="slider" id="nav4" />

            <ul id="mynav">
                <li><label for="nav0">Slide01</label></li>
                <li><label for="nav1">Slide02</label></li>
                <li><label for="nav2">Slide03</label></li>
                <li><label for="nav3">Slide04</label></li>
                <li><label for="nav4">Slide05</label></li>
            </ul>

            <!-- Slides -->
            <section id="main">
                <div class="parallax-layer" id="slide1">
                    <p>Fancy website</p>
                </div>
                <div class="parallax-layer" id="slide2">
                    <p>Team</p>
                </div>
                <div class="parallax-layer" id="slide3">
                    <p>Projects</p>
                </div>
                <div class="parallax-layer" id="slide4">
                    <p>More Projects</p>
                    <path
                        class="xe3v8dz"
                        d="M13.651 35.471v-11.97H9.936V18h3.715v-2.37c0-6.127 2.772-8.964 8.784-8.964 1.138 0 3.103.223 3.91.446v4.983c-.425-.043-1.167-.065-2.081-.065-2.952 0-4.09 1.116-4.09 4.025V18h5.883l-1.008 5.5h-4.867v12.37a18.183 18.183 0 0 1-6.53-.399Z"
                    ></path>
                </div>
                <div class="parallax-layer" id="slide5">
                    <div class="page">
                        <div class="content">
                            <div class="circle">
                                <div class="circle_title">
                                    <h2>City Breaks</h2>
                                    <h3>Go somewhere new</h3>
                                </div>
                                <div class="circle_inner">
                                    <div class="circle_inner__layer _bg">
                                        <img
                                            src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/217233/pc1.png"
                                        />
                                    </div>
                                    <div
                                        class="circle_inner__layer _char"
                                    ></div>
                                </div>
                                <div class="content_shadow"></div>
                            </div>
                        </div>
                        <div class="content">
                            <a
                                href="https://github.com/tasoo-oos"
                                target="_blank"
                                rel="noopener noreferrer"
                            >
                                <div class="circle">
                                    <div class="circle_title">
                                        <h2>github profile</h2>
                                    </div>
                                    <div class="circle_inner">
                                        <div class="circle_inner__layer _bg">
                                            <img src="img/github_bg.png" />
                                        </div>
                                        <div class="circle_inner__layer _char">
                                            <img src="img/github_char.png" />
                                        </div>
                                    </div>
                                    <div class="content_shadow"></div>
                                </div>
                            </a>
                        </div>
                        <div class="content">
                            <div class="circle">
                                <div class="circle_title">
                                    <h2>Cheap Flights</h2>
                                    <h3>Come fly with me</h3>
                                </div>
                                <div class="circle_inner">
                                    <div class="circle_inner__layer _bg">
                                        <img
                                            src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/217233/pc7.png"
                                        />
                                    </div>
                                    <div class="circle_inner__layer _char">
                                        <img
                                            src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/217233/pc9.png"
                                        />
                                    </div>
                                </div>
                                <div class="content_shadow"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </body>
</html>
